<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo invisible</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- SECCIÓN SUPERIOR -->
    <div class="top-section">
        <!-- Parte Izquierda -->
        <div class="left-controls">
            <h1>Amigo invisible</h1>
            <div class="formulario">
                <input type="text" id="nombre" placeholder="Nombre del amigo...">
                <input type="button" value="Añadir" id="botonAnyadir">
            </div>
        </div>
        
        <!-- Parte Derecha -->
        <div class="right-controls">
            <input type="button" value="Reparte" id="botonResuelve">
        </div>
    </div>
    
    <!-- COLUMNAS -->
    <div class="main-container">
        <!-- COLUMNA IZQUIERDA -->
        <div class="col-left">
            <div id="panel">
                <h3>Lista de amigos</h3>
                <ul id="lista-amigos"></ul>
            </div>
        </div>
        
        <!-- COLUMNA DERECHA -->
        <div class="col-right">
            <div id="solucion">
                <h3>Resultado del sorteo</h3>
                <div class="tabla-container" id="tabla-container">
                    <p style="color: gray; font-style: italic;">Añade al menos 3 amigos y pulsa "Reparte"</p>
                </div>
            </div>
        </div>
    </div>
    <!-- JAVASCRIPT -->
   <script src="js/app.js"></script>
</body>
</html>

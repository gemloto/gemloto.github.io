<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cifrado César</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Cifrado César</h1>
        
        <div class="form-row">
            <label for="frase">Frase:</label>
            <input id="frase" type="text" placeholder="introduce la frase a cifrar">
        </div>
        
        <div class="form-row">
            <label for="paso">Paso:</label>
            <input id="paso" type="number" placeholder="Cuántas letras debo saltar">
        </div>
        
        <button id="btn-cifrar">Cifrar</button>
        
        <hr>
        
        <p id="resultado" class="resultado">Aquí irá la frase cifrada</p>
    </div>
</body>
</html>
